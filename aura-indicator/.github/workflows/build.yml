name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Go mod tidy (Linux)
        if: runner.os == 'Linux'
        run: go mod tidy

      - name: Build aura-ctl (${{ matrix.goos }}/${{ matrix.goarch }})
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o "dist/aura-ctl_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/aura-ctl/

      - name: Build aura-indicator (${{ matrix.goos }}/${{ matrix.goarch }})
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o "dist/aura-indicator_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/aura-indicator/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aura-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aura-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aura-ctl_linux_amd64
            aura-ctl_linux_arm64
            aura-ctl_windows_amd64.exe
            aura-ctl_darwin_amd64
            aura-ctl_darwin_arm64
            aura-indicator_linux_amd64
            aura-indicator_linux_arm64
            aura-indicator_windows_amd64.exe
            aura-indicator_darwin_amd64
            aura-indicator_darwin_arm64
